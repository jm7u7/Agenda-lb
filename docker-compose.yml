version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: limablue_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: limablue
      POSTGRES_PASSWORD: limablue2025
      POSTGRES_DB: limablue_agenda
    ports:
      - "5432:5432"
    volumes:
      - limablue_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limablue -d limablue_agenda"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: limablue_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  limablue_pg_data:
