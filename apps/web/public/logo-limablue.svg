<svg viewBox="0 0 360 240" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Marca: arco de "huella" de 5 elipses ascendentes -->
  <g fill="#ffffff" transform="rotate(-18 175 110)">
    <ellipse cx="70"  cy="150" rx="8"  ry="10"/>
    <ellipse cx="98"  cy="128" rx="10" ry="12.5"/>
    <ellipse cx="130" cy="108" rx="12.5" ry="15"/>
    <ellipse cx="168" cy="94"  rx="15" ry="17.5"/>
    <ellipse cx="212" cy="88"  rx="18.5" ry="21"/>
  </g>
  <!-- Wordmark -->
  <text x="180" y="180" text-anchor="middle" fill="#ffffff"
        font-family="'Poppins','Century Gothic','Trebuchet MS',sans-serif"
        font-size="78" font-weight="700" font-style="italic" letter-spacing="-3">limablue</text>
  <!-- AGENDA con líneas a los lados -->
  <line x1="92" y1="210" x2="128" y2="210" stroke="#ffffff" stroke-width="2"/>
  <text x="180" y="217" text-anchor="middle" fill="#ffffff"
        font-family="'Poppins','Trebuchet MS',sans-serif"
        font-size="22" font-weight="500" letter-spacing="10">AGENDA</text>
  <line x1="232" y1="210" x2="268" y2="210" stroke="#ffffff" stroke-width="2"/>
</svg>
